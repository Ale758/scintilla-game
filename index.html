<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scintilla — corsa al tramonto</title>
<style>
  :root {
    --page-bg: #0A0710;
    --sky-top: #170B2E;
    --ui-text: #F5EFE6;
    --ui-dim: #B9A9C9;
    --runner: #FFD166;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; height: 100%; }

  body {
    background: var(--page-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ui-text);
    padding: 16px;
    overscroll-behavior: none;
  }

  #frame {
    width: min(1180px, 95vw);
    border-radius: 20px;
    padding: 3px;
    background: linear-gradient(135deg, rgba(255,209,102,.4), rgba(122,59,94,.3));
    box-shadow: 0 30px 80px rgba(0,0,0,.55);
  }

  #inner {
    border-radius: 18px;
    overflow: hidden;
    background: var(--sky-top);
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    touch-action: none;
  }

  .hud {
    position: absolute;
    top: 18px;
    display: flex;
    flex-direction: column;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    pointer-events: none;
    text-shadow: 0 2px 10px rgba(0,0,0,.6);
  }
  .hud .label {
    font-size: 10px;
    letter-spacing: .18em;
    color: var(--ui-dim);
    text-transform: uppercase;
  }
  .hud .value { font-size: 26px; font-weight: 600; line-height: 1.2; }
  #score-box { left: 20px; align-items: flex-start; }
  #best-box { right: 20px; align-items: flex-end; }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(10,7,16,.6);
    backdrop-filter: blur(3px);
    gap: 14px;
    padding: 20px;
    transition: opacity .25s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 {
    margin: 0;
    font-size: clamp(30px, 6vw, 46px);
    letter-spacing: .03em;
    text-transform: uppercase;
    font-weight: 800;
  }
  #overlay p {
    margin: 0;
    color: var(--ui-dim);
    font-size: 15px;
    max-width: 360px;
    line-height: 1.5;
  }
  #final-score-wrap { display: none; font-family: ui-monospace, monospace; }
  #final-score-wrap .tiny {
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ui-dim);
  }
  #final-score { font-size: 38px; color: var(--runner); font-weight: 700; }

  button#restart {
    font: inherit;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    font-size: 14px;
    padding: 13px 30px;
    border-radius: 999px;
    border: none;
    background: var(--runner);
    color: #2b1a00;
    cursor: pointer;
    margin-top: 6px;
  }
  button#restart:hover { filter: brightness(1.06); }
  button#restart:focus-visible { outline: 3px solid var(--ui-text); outline-offset: 3px; }
  button#restart:active { transform: translateY(1px); }

  @media (prefers-reduced-motion: reduce) {
    #overlay { transition: none; }
  }
</style>
</head>
<body>
  <div id="frame">
    <div id="inner">
      <canvas id="game" width="960" height="460"
        aria-label="Area di gioco: Scintilla, corsa infinita a schivare ostacoli"></canvas>

      <div class="hud" id="score-box">
        <span class="label">Punti</span>
        <span class="value" id="score-val">0</span>
      </div>
      <div class="hud" id="best-box">
        <span class="label">Record</span>
        <span class="value" id="best-val">0</span>
      </div>

      <div id="overlay">
        <h1 id="overlay-title">Scintilla</h1>
        <p id="overlay-text">Salta con SPAZIO o freccia SU, abbassati con la freccia GIÙ per chi vola. Su schermo: tocca in alto per saltare, in basso per abbassarti. I bagliori danno bonus.</p>
        <div id="final-score-wrap">
          <div class="tiny">Punteggio finale</div>
          <div id="final-score">0</div>
        </div>
        <button id="restart" type="button">Accendi</button>
      </div>
    </div>
  </div>

<script>
/*
  SCINTILLA — corsa infinita
  ---------------------------------
  1) Riferimenti DOM e costanti
  2) Stato di gioco
  3) Logica (salto, abbassarsi, power-up, spawn, aggiornamento, collisioni)
  4) Disegno (sfondo, ostacoli, power-up, giocatore, particelle)
  5) Game loop e input

  Novità di questa versione:
  - ostacoli volanti: si schivano abbassandosi (freccia GIÙ, o tocco
    nella metà bassa dello schermo)
  - power-up: scudo (assorbe un colpo) e doppio salto (un salto extra
    a mezz'aria), raccolti passandoci sopra
  - pattern di ostacoli: doppio, salta-poi-abbassati, abbassati-poi-
    salta, fila bassa — invece del solito ostacolo singolo
  - audio sintetizzato (Web Audio API, zero file esterni): salto,
    abbassarsi, raccolta power-up, game over

  Per restare corretti quando la velocità cambia, la larghezza degli
  ostacoli "larghi" e la distanza nei pattern combinati sono calcolate
  in base alla velocità attuale (vedi safeWideWidth/comboGapPx), non
  fissate in pixel — così restano sempre superabili.

  Idee per il prossimo giro: un pulsante muto, un suono quando lo
  scudo assorbe un colpo, un suono quando si atterra, nuovo tema
  visivo, record persistente (serve localStorage, funziona fuori da
  Claude, es. GitHub Pages/Vercel), pausa, verticale su mobile.

  Costanti utili da ritoccare: GRAVITY, JUMP_V (fisica del salto),
  SHIELD_DURATION, SCORE_UNLOCK_* e le formule di "speed"/"spawnGap".
*/
(() => {
  // ---------- 1) DOM e costanti ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreVal = document.getElementById('score-val');
  const bestVal = document.getElementById('best-val');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayText = document.getElementById('overlay-text');
  const finalScoreWrap = document.getElementById('final-score-wrap');
  const finalScoreEl = document.getElementById('final-score');
  const restartBtn = document.getElementById('restart');

  const COLORS = {
    skyTop: '#170B2E',
    skyMid: '#4A2255',
    sunGlow: 'rgba(255,138,91,.5)',
    sunCore: '#FFD9B8',
    ridgeFar: '#2B1740',
    ground: '#0D0714',
    groundLine: 'rgba(255,209,102,.15)',
    tick: 'rgba(245,239,230,.12)',
    star: '#F5EFE6',
    runner: '#FFD166',
    runnerGlow: 'rgba(255,209,102,.5)',
    obstacle: '#7A3B5E',
    obstacleEdge: '#C77FA0',
    flying: '#9C4B72',
    flyingEdge: '#E08CB0',
    power: '#8FE9DD',
    powerEdge: '#EAFFFB',
    shieldRing: 'rgba(143,233,221,.9)'
  };

  const LOGICAL_W = 960, LOGICAL_H = 460, GROUND_Y = 360;
  const GRAVITY = 2200, JUMP_V = -600;
  const JUMP_AIRTIME = 2 * Math.abs(JUMP_V) / GRAVITY; // ~0.545s, usato per la sicurezza dei pattern
  const DUCK_R = 8;
  const SHIELD_DURATION = 4.5;
  const SCORE_UNLOCK_FLYING = 15;
  const SCORE_UNLOCK_PATTERNS = 35;
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- 2) Stato di gioco ----------
  let state = 'start'; // 'start' | 'playing' | 'gameover'
  let player, obstacles, particles, stars, powerUps;
  let speed, spawnTimer, spawnGap, powerTimer, powerGap, score, best = 0, shake, lastTime;
  let offsetFar = 0, offsetGround = 0;
  let dpr = 1;
  let activePointerId = null;
  let audioCtx = null;

  function resetGame() {
    player = {
      x: 130, y: GROUND_Y, vy: 0, r: 15, squash: 1, onGround: true,
      isDucking: false, shieldTime: 0, extraJumps: 0
    };
    obstacles = [];
    particles = [];
    powerUps = [];
    speed = 260;
    spawnTimer = 0;
    spawnGap = 1400;
    powerTimer = 0;
    powerGap = 8000 + Math.random() * 4000;
    score = 0;
    shake = 0;
    offsetFar = 0;
    offsetGround = 0;
    lastTime = performance.now();
  }

  function makeStars() {
    stars = [];
    for (let i = 0; i < 40; i++) {
      stars.push({
        x: Math.random() * LOGICAL_W,
        y: Math.random() * (GROUND_Y - 30),
        r: Math.random() * 1.3 + .3,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = LOGICAL_W * dpr;
    canvas.height = LOGICAL_H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  // ---------- 3) Logica di gioco ----------

  // Audio: sintetizzato con Web Audio API, zero file esterni (stessa
  // tecnica usata in FOSCA). L'AudioContext si crea/riattiva al primo
  // input, perché i browser bloccano l'audio finché l'utente non
  // interagisce con la pagina. playTone() è l'unico "sintetizzatore":
  // ogni suono è solo una combinazione diversa dei suoi parametri.
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone({ freq, freqEnd = null, delay = 0, duration = 0.15, type = 'sine', peakGain = 0.2 }) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime + delay;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration * 0.6);
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(peakGain, t + Math.min(0.01, duration * 0.1));
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  function playBounceSound(isExtraJump) {
    const wobble = (Math.random() - 0.5) * 30;
    const f = (isExtraJump ? 460 : 380) + wobble;
    playTone({ freq: f, freqEnd: f * 1.9, duration: 0.15, type: 'sine', peakGain: 0.22 });
  }

  function playDuckSound() {
    const wobble = (Math.random() - 0.5) * 20;
    const f = 320 + wobble;
    playTone({ freq: f, freqEnd: f * 0.55, duration: 0.12, type: 'sine', peakGain: 0.18 });
  }

  function playCollectSound(kind) {
    const base = kind === 'shield' ? 520 : 660;
    playTone({ freq: base, duration: 0.16, type: 'triangle', peakGain: 0.2 });
    playTone({ freq: base * 1.5, delay: 0.07, duration: 0.16, type: 'triangle', peakGain: 0.2 });
  }

  function playGameOverSound() {
    playTone({ freq: 320, freqEnd: 160, duration: 0.35, type: 'triangle', peakGain: 0.2 });
    playTone({ freq: 220, freqEnd: 100, duration: 0.4, delay: 0.08, type: 'triangle', peakGain: 0.16 });
  }

  function jump() {
    ensureAudio();
    if (state === 'start' || state === 'gameover') { startGame(); return; }
    if (state !== 'playing' || player.isDucking) return;
    if (player.onGround) {
      player.vy = JUMP_V;
      player.onGround = false;
      player.squash = 1.3;
      playBounceSound(false);
    } else if (player.extraJumps > 0) {
      player.extraJumps -= 1;
      player.vy = JUMP_V * 0.92;
      player.squash = 1.3;
      spawnBurstParticles(player.x, player.y, true);
      playBounceSound(true);
    }
  }

  function startDuck() {
    if (state !== 'playing') return;
    if (!player.isDucking) playDuckSound();
    player.isDucking = true;
  }
  function endDuck() {
    player.isDucking = false;
  }

  function startGame() {
    resetGame();
    state = 'playing';
    overlay.classList.add('hidden');
  }

  function endGame() {
    state = 'gameover';
    playGameOverSound();
    best = Math.max(best, Math.floor(score));
    bestVal.textContent = best;
    overlayTitle.textContent = 'Spenta!';
    overlayText.textContent = 'Hai toccato un ostacolo. Premi SPAZIO, la freccia SU, oppure tocca lo schermo per riaccenderti.';
    finalScoreWrap.style.display = 'block';
    finalScoreEl.textContent = Math.floor(score);
    restartBtn.textContent = 'Riaccendi';
    overlay.classList.remove('hidden');
    shake = 12;
  }

  function spawnGroundObstacle(dx, wOverride, hOverride) {
    const h = hOverride ?? (28 + Math.random() * 24);
    const w = wOverride ?? (18 + Math.random() * 14);
    obstacles.push({ x: LOGICAL_W + 20 + (dx || 0), y: GROUND_Y - h, w, h, type: 'ground' });
  }

  function spawnFlyingObstacle(dx) {
    const h = 34, w = 46, bottom = GROUND_Y - 20;
    obstacles.push({ x: LOGICAL_W + 20 + (dx || 0), y: bottom - h, w, h, type: 'flying' });
  }

  // Larghezza massima con cui un ostacolo "largo" resta superabile con un
  // salto normale, alla velocità attuale (con margine di sicurezza).
  function safeWideWidth(desired) {
    const maxSafe = speed * JUMP_AIRTIME - player.r * 2 - 20;
    return Math.max(40, Math.min(desired, maxSafe));
  }
  // Distanza (px) tra due ostacoli di tipo diverso in un pattern combinato,
  // calcolata per garantire un intervallo di tempo sicuro qualunque sia
  // la velocità attuale.
  function comboGapPx() {
    return speed * 0.85;
  }

  const PATTERNS = [
    () => spawnGroundObstacle(0, safeWideWidth(110), 34),                          // ostacolo doppio
    () => { spawnGroundObstacle(0, 24, 36); spawnFlyingObstacle(comboGapPx()); },   // salta poi abbassati
    () => { spawnFlyingObstacle(0); spawnGroundObstacle(comboGapPx(), 24, 36); },   // abbassati poi salta
    () => spawnGroundObstacle(0, safeWideWidth(150), 22)                           // fila bassa
  ];

  function spawnObstacle() {
    const canPattern = score > SCORE_UNLOCK_PATTERNS;
    const canFly = score > SCORE_UNLOCK_FLYING;
    if (canPattern && Math.random() < 0.28) {
      PATTERNS[Math.floor(Math.random() * PATTERNS.length)]();
      return;
    }
    if (canFly && Math.random() < 0.35) spawnFlyingObstacle(0);
    else spawnGroundObstacle(0);
  }

  function spawnPowerUp() {
    const kind = Math.random() < 0.5 ? 'shield' : 'jump';
    powerUps.push({ x: LOGICAL_W + 20, y: GROUND_Y - 90, r: 13, kind });
  }

  function spawnBurstParticles(x, y, gold) {
    for (let i = 0; i < 6; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 160,
        vy: -Math.random() * 120 - 30,
        age: 0,
        life: 0.4,
        color: gold ? COLORS.power : COLORS.runner
      });
    }
  }

  function update(dt) {
    if (state !== 'playing') return;

    score += dt * (speed / 60);
    scoreVal.textContent = Math.floor(score);

    speed = Math.min(520, 260 + score * 0.85);
    spawnGap = Math.max(900, 1400 - score * 2.5);

    if (player.shieldTime > 0) player.shieldTime = Math.max(0, player.shieldTime - dt);

    // fisica del giocatore
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.vy = 0;
      if (!player.onGround) {
        player.squash = 0.75;
        spawnBurstParticles(player.x, GROUND_Y, false);
      }
      player.onGround = true;
    }
    player.squash += (1 - player.squash) * Math.min(1, dt * 8);

    // ostacoli
    spawnTimer += dt * 1000;
    if (spawnTimer > spawnGap) {
      spawnTimer = 0;
      spawnObstacle();
    }
    for (const o of obstacles) o.x -= speed * dt;
    obstacles = obstacles.filter(o => o.x + o.w > -20);

    // power-up: spawn, movimento, raccolta
    powerTimer += dt * 1000;
    if (powerTimer > powerGap) {
      powerTimer = 0;
      powerGap = 8000 + Math.random() * 4000;
      spawnPowerUp();
    }
    for (const p of powerUps) p.x -= speed * dt;
    powerUps = powerUps.filter(p => p.x + p.r > -20);

    const pcx = player.x, pcy = player.y - player.r;
    powerUps = powerUps.filter(p => {
      const ddx = pcx - p.x, ddy = pcy - p.y;
      const hit = Math.sqrt(ddx * ddx + ddy * ddy) < (p.r + player.r * 0.8);
      if (hit) {
        if (p.kind === 'shield') player.shieldTime = SHIELD_DURATION;
        else player.extraJumps = Math.min(1, player.extraJumps + 1);
        spawnBurstParticles(p.x, p.y, true);
        playCollectSound(p.kind);
      }
      return !hit;
    });

    // particelle
    for (const p of particles) {
      p.age += dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += GRAVITY * 0.5 * dt;
    }
    particles = particles.filter(p => p.age < p.life);

    // collisione con ostacoli: cerchio del giocatore, ridotto se abbassato
    const isCrouched = player.isDucking && player.onGround;
    const ccx = player.x;
    const ccy = isCrouched ? (GROUND_Y - DUCK_R) : (player.y - player.r);
    const forgiveness = isCrouched ? (DUCK_R - 3) : (player.r - 3);
    let destroyedOne = false;
    for (const o of obstacles) {
      const nx = Math.max(o.x, Math.min(ccx, o.x + o.w));
      const ny = Math.max(o.y, Math.min(ccy, o.y + o.h));
      const ddx = ccx - nx, ddy = ccy - ny;
      if (ddx * ddx + ddy * ddy < forgiveness * forgiveness) {
        if (player.shieldTime > 0) {
          // lo scudo assorbe il colpo e distrugge l'ostacolo urtato,
          // cosi` non si ripete la collisione al fotogramma successivo
          player.shieldTime = 0;
          shake = 8;
          o.destroyed = true;
          destroyedOne = true;
          spawnBurstParticles(o.x + o.w / 2, o.y + o.h / 2, true);
        } else {
          endGame();
        }
        break;
      }
    }
    if (destroyedOne) obstacles = obstacles.filter(o => !o.destroyed);

    if (shake > 0) shake = Math.max(0, shake - dt * 36);
  }

  // ---------- 4) Disegno ----------
  function drawBackground(t) {
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    g.addColorStop(0, COLORS.skyTop);
    g.addColorStop(1, COLORS.skyMid);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, LOGICAL_W, GROUND_Y);

    const sunX = LOGICAL_W * 0.78, sunY = GROUND_Y - 6;
    const glow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 190);
    glow.addColorStop(0, COLORS.sunGlow);
    glow.addColorStop(1, 'rgba(255,138,91,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, LOGICAL_W, GROUND_Y);
    ctx.beginPath();
    ctx.fillStyle = COLORS.sunCore;
    ctx.arc(sunX, sunY, 24, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = COLORS.star;
    for (const s of stars) {
      const twinkle = reduceMotion ? 0.6 : 0.55 + 0.45 * Math.sin(t / 480 + s.phase);
      ctx.globalAlpha = twinkle;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    drawRidge(offsetFar, GROUND_Y - 18, 42, COLORS.ridgeFar);

    ctx.fillStyle = COLORS.ground;
    ctx.fillRect(0, GROUND_Y, LOGICAL_W, LOGICAL_H - GROUND_Y);

    ctx.strokeStyle = COLORS.groundLine;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y);
    ctx.lineTo(LOGICAL_W, GROUND_Y);
    ctx.stroke();

    ctx.strokeStyle = COLORS.tick;
    ctx.lineWidth = 3;
    const gap = 70;
    const start = -(offsetGround % gap);
    for (let x = start; x < LOGICAL_W + gap; x += gap) {
      ctx.beginPath();
      ctx.moveTo(x, GROUND_Y + 16);
      ctx.lineTo(x + 26, GROUND_Y + 16);
      ctx.stroke();
    }
  }

  function drawRidge(offset, baseY, amp, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, LOGICAL_H);
    const step = 60;
    for (let x = -step; x <= LOGICAL_W + step; x += step) {
      const py = baseY - amp * Math.abs(Math.sin((x + offset) * 0.008));
      ctx.lineTo(x, py);
    }
    ctx.lineTo(LOGICAL_W, LOGICAL_H);
    ctx.closePath();
    ctx.fill();
  }

  function spikePath(x, y, w, h, bumps) {
    ctx.beginPath();
    ctx.moveTo(x, y + h);
    const step = w / bumps;
    for (let i = 0; i < bumps; i++) {
      ctx.lineTo(x + step * i + step / 2, y);
      ctx.lineTo(x + step * (i + 1), y + h);
    }
    ctx.closePath();
  }

  function drawObstacles() {
    for (const o of obstacles) {
      const isFlying = o.type === 'flying';
      ctx.fillStyle = isFlying ? COLORS.flying : COLORS.obstacle;
      ctx.strokeStyle = isFlying ? COLORS.flyingEdge : COLORS.obstacleEdge;
      ctx.lineWidth = 1.5;
      const bumps = Math.max(1, Math.round(o.w / 34));
      spikePath(o.x, o.y, o.w, o.h, bumps);
      ctx.fill();
      ctx.stroke();
      if (isFlying) {
        ctx.strokeStyle = COLORS.flyingEdge;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(o.x + o.w * 0.25, o.y);
        ctx.lineTo(o.x + o.w * 0.25, 0);
        ctx.moveTo(o.x + o.w * 0.75, o.y);
        ctx.lineTo(o.x + o.w * 0.75, 0);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawPowerUps(t) {
    for (const p of powerUps) {
      const bob = reduceMotion ? 0 : Math.sin(t / 260 + p.x * 0.02) * 4;
      const y = p.y + bob;

      const glow = ctx.createRadialGradient(p.x, y, 0, p.x, y, p.r * 2.4);
      glow.addColorStop(0, 'rgba(143,233,221,.5)');
      glow.addColorStop(1, 'rgba(143,233,221,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(p.x, y, p.r * 2.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.power;
      ctx.strokeStyle = COLORS.powerEdge;
      ctx.lineWidth = 1.5;
      const r = p.r;

      if (p.kind === 'shield') {
        ctx.beginPath();
        ctx.moveTo(p.x - r * 0.8, y - r * 0.6);
        ctx.lineTo(p.x - r * 0.8, y + r * 0.15);
        ctx.quadraticCurveTo(p.x - r * 0.8, y + r * 0.9, p.x, y + r);
        ctx.quadraticCurveTo(p.x + r * 0.8, y + r * 0.9, p.x + r * 0.8, y + r * 0.15);
        ctx.lineTo(p.x + r * 0.8, y - r * 0.6);
        ctx.quadraticCurveTo(p.x, y - r * 0.4, p.x - r * 0.8, y - r * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(p.x, y - r);
        ctx.lineTo(p.x + r * 0.7, y);
        ctx.lineTo(p.x + r * 0.3, y);
        ctx.lineTo(p.x + r * 0.3, y + r * 0.8);
        ctx.lineTo(p.x - r * 0.3, y + r * 0.8);
        ctx.lineTo(p.x - r * 0.3, y);
        ctx.lineTo(p.x - r * 0.7, y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color || COLORS.runner;
      ctx.beginPath();
      ctx.arc(p.x, p.y - 4, 2.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer() {
    const isCrouched = player.isDucking && player.onGround;
    const cx = player.x;
    const cy = isCrouched ? (GROUND_Y - DUCK_R) : (player.y - player.r);

    if (player.shieldTime > 0) {
      ctx.save();
      ctx.globalAlpha = 0.55 + 0.25 * Math.sin(performance.now() / 120);
      ctx.strokeStyle = COLORS.shieldRing;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(cx, cy, (isCrouched ? DUCK_R : player.r) + 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.save();
    if (isCrouched) {
      const ry = DUCK_R, rx = player.r * 1.25;
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, rx * 2);
      glow.addColorStop(0, COLORS.runnerGlow);
      glow.addColorStop(1, 'rgba(255,209,102,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx * 2, ry * 2, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.runner;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.translate(cx, cy);
      ctx.scale(1 / player.squash, player.squash);

      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, player.r * 2.4);
      glow.addColorStop(0, COLORS.runnerGlow);
      glow.addColorStop(1, 'rgba(255,209,102,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, player.r * 2.4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = COLORS.runner;
      ctx.beginPath();
      ctx.arc(0, 0, player.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    if (player.extraJumps > 0 && !player.onGround) {
      ctx.fillStyle = COLORS.power;
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(cx, cy - player.r - 20, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function render(t) {
    ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
    ctx.save();
    if (shake > 0) {
      ctx.translate((Math.random() - .5) * shake, (Math.random() - .5) * shake);
    }
    drawBackground(t);
    drawObstacles();
    drawPowerUps(t);
    drawParticles();
    drawPlayer();
    ctx.restore();
  }

  // ---------- 5) Game loop e input ----------
  function loop(now) {
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    if (state === 'playing') {
      offsetFar += speed * 0.3 * dt;
      offsetGround += speed * dt;
    }
    update(dt);
    render(now);
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      jump();
    } else if (e.code === 'ArrowDown') {
      e.preventDefault();
      startDuck();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowDown') endDuck();
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { endDuck(); activePointerId = null; }
  });

  canvas.addEventListener('pointerdown', (e) => {
    if (state !== 'playing') { jump(); return; }
    const rect = canvas.getBoundingClientRect();
    const relY = (e.clientY - rect.top) / rect.height;
    if (relY > 0.55) {
      startDuck();
      activePointerId = e.pointerId;
    } else {
      jump();
    }
  });
  canvas.addEventListener('pointerup', (e) => {
    if (e.pointerId === activePointerId) { endDuck(); activePointerId = null; }
  });
  canvas.addEventListener('pointercancel', (e) => {
    if (e.pointerId === activePointerId) { endDuck(); activePointerId = null; }
  });
  overlay.addEventListener('click', jump);

  resize();
  makeStars();
  resetGame();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
